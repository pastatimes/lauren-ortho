backend:
  name: git-gateway
  branch: main

media_folder: "."
public_folder: "."

locale: nl

collections:
  - name: "site"
    label: "Website"
    files:
      - name: "content"
        label: "Alle instellingen"
        file: "content.json"
        format: json
        fields:

          - label: "Stijl"
            name: "stijl"
            widget: "object"
            fields:
              - label: "Kleurthema"
                name: "kleur_thema"
                widget: "select"
                options:
                  - { label: "Groen (standaard)", value: "groen" }
                  - { label: "Blauw", value: "blauw" }
                  - { label: "Terracotta", value: "terracotta" }
                  - { label: "Lavendel", value: "lavendel" }
                  - { label: "Zand", value: "zand" }
              - label: "Lettertype koppen"
                name: "kop_lettertype"
                widget: "select"
                options:
                  - { label: "Cormorant Garamond – elegant (standaard)", value: "Cormorant Garamond" }
                  - { label: "Playfair Display – klassiek", value: "Playfair Display" }
                  - { label: "Lora – warm & leesbaar", value: "Lora" }
                  - { label: "DM Serif Display – modern", value: "DM Serif Display" }
              - label: "Lettertype tekst"
                name: "tekst_lettertype"
                widget: "select"
                options:
                  - { label: "Inter – strak (standaard)", value: "Inter" }
                  - { label: "DM Sans – vriendelijk", value: "DM Sans" }
                  - { label: "Nunito – zacht", value: "Nunito" }
                  - { label: "Source Sans – zakelijk", value: "Source Sans 3" }

          - label: "Secties tonen / verbergen"
            name: "secties"
            widget: "object"
            fields:
              - { label: "Over mij", name: "over", widget: "boolean", default: true }
              - { label: "Het traject", name: "traject", widget: "boolean", default: true }
              - { label: "Werkwijze", name: "werkwijze", widget: "boolean", default: true }
              - { label: "Ervaringen", name: "testimonials", widget: "boolean", default: true }
              - { label: "Groene CTA-banner", name: "cta-sectie", widget: "boolean", default: true }
              - { label: "Contact", name: "contact", widget: "boolean", default: true }

          - label: "Afbeeldingen"
            name: "afbeeldingen"
            widget: "object"
            fields:
              - { label: "Profielfoto", name: "profielfoto", widget: "image" }

          - label: "Hero (bovenste blok)"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Label boven de titel", name: "tag", widget: "string" }
              - { label: "Titel regel 1", name: "titel1", widget: "string" }
              - { label: "Titel regel 2 (cursief, accentkleur)", name: "titel2", widget: "string" }
              - { label: "Titel regel 3", name: "titel3", widget: "string" }
              - { label: "Ondertitel", name: "subtitel", widget: "text" }

          - label: "Over mij"
            name: "over"
            widget: "object"
            fields:
              - { label: "Alinea 1", name: "tekst1", widget: "text" }
              - { label: "Alinea 2", name: "tekst2", widget: "text" }
              - { label: "Alinea 3 (achtergrond & locatie)", name: "tekst3", widget: "text" }

          - label: "Het traject (3 kaarten)"
            name: "traject"
            widget: "object"
            fields:
              - { label: "Introductietekst", name: "intro", widget: "text" }
              - label: "Kaart 1"
                name: "stap1"
                widget: "object"
                fields:
                  - { label: "Titel", name: "titel", widget: "string" }
                  - { label: "Tekst", name: "tekst", widget: "text" }
              - label: "Kaart 2"
                name: "stap2"
                widget: "object"
                fields:
                  - { label: "Titel", name: "titel", widget: "string" }
                  - { label: "Tekst", name: "tekst", widget: "text" }
              - label: "Kaart 3"
                name: "stap3"
                widget: "object"
                fields:
                  - { label: "Titel", name: "titel", widget: "string" }
                  - { label: "Tekst", name: "tekst", widget: "text" }

          - label: "Werkwijze (4 stappen)"
            name: "werkwijze"
            widget: "object"
            fields:
              - label: "Stap 1"
                name: "stap1"
                widget: "object"
                fields:
                  - { label: "Titel", name: "titel", widget: "string" }
                  - { label: "Tekst", name: "tekst", widget: "text" }
              - label: "Stap 2"
                name: "stap2"
                widget: "object"
                fields:
                  - { label: "Titel", name: "titel", widget: "string" }
                  - { label: "Tekst", name: "tekst", widget: "text" }
              - label: "Stap 3"
                name: "stap3"
                widget: "object"
                fields:
                  - { label: "Titel", name: "titel", widget: "string" }
                  - { label: "Tekst", name: "tekst", widget: "text" }
              - label: "Stap 4"
                name: "stap4"
                widget: "object"
                fields:
                  - { label: "Titel", name: "titel", widget: "string" }
                  - { label: "Tekst", name: "tekst", widget: "text" }

          - label: "Ervaringen (testimonials)"
            name: "testimonials"
            widget: "object"
            fields:
              - label: "Ervaring 1"
                name: "t1"
                widget: "object"
                fields:
                  - { label: "Quote", name: "quote", widget: "text" }
                  - { label: "Naam & woonplaats", name: "naam", widget: "string" }
              - label: "Ervaring 2"
                name: "t2"
                widget: "object"
                fields:
                  - { label: "Quote", name: "quote", widget: "text" }
                  - { label: "Naam & woonplaats", name: "naam", widget: "string" }

          - label: "Contactgegevens"
            name: "contact"
            widget: "object"
            fields:
              - { label: "E-mailadres", name: "email", widget: "string" }
              - { label: "Telefoonnummer", name: "telefoon", widget: "string" }
              - { label: "Locatie", name: "locatie", widget: "string" }

          - label: "Footer"
            name: "footer"
            widget: "object"
            fields:
              - { label: "KvK-nummer", name: "kvk", widget: "string" }
